<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>子辰资产管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="资产管理">
    <link rel="apple-touch-icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=asset%20management%20system%20icon%20with%20building%20and%20asset%20tags&image_size=square">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</head>
<body>
    <div id="app">
        <div id="main-screen" class="screen active">
            <div class="header">
                <h1>子辰资产管理系统</h1>
            </div>
            <div class="content">
                <div id="import-section" class="import-section">
                    <h2>请导入资产表格</h2>
                    <input type="file" id="excel-import" accept=".xlsx,.xls">
                    <p class="hint">支持格式: .xlsx, .xls</p>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
                        <h3 style="margin-bottom: 15px; font-size: 16px;">或恢复备份数据</h3>
                        <input type="file" id="backup-import" accept=".json">
                        <p class="hint">选择之前备份的JSON文件</p>
                    </div>
                </div>
                <div id="departments-section" class="departments-section" style="display: none;">
                    <div class="departments-list" id="departments-list"></div>
                </div>
            </div>
            <div class="footer">
                <div style="display: flex; gap: 10px;">
                    <button id="btn-backup" class="footer-btn" style="flex: 1;">备份数据</button>
                    <button id="btn-view-data" class="footer-btn" style="flex: 1;">查看数据</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-clear-data" class="footer-btn danger" style="flex: 1;">清除数据</button>
                    <button id="btn-legacy" class="footer-btn" style="flex: 1;">遗留资产区域</button>
                </div>
                <p class="hint" style="margin-top: 10px; text-align: center;">提示：数据自动保存，建议定期点击"备份数据"导出文件</p>
            </div>
        </div>

        <div id="department-screen" class="screen">
            <div class="header">
                <button id="btn-back-from-dept" class="back-btn">← 返回</button>
                <h1 id="dept-title">科室资产</h1>
            </div>
            <div class="content">
                <div id="assets-list" class="assets-list"></div>
            </div>
            <div class="footer">
                <button id="btn-register-complete" class="footer-btn primary">登记完成</button>
            </div>
        </div>

        <div id="pending-screen" class="screen">
            <div class="header">
                <button id="btn-back-from-pending" class="back-btn">← 返回</button>
                <h1 id="pending-title">科室遗留资产待处理</h1>
            </div>
            <div class="content">
                <div id="pending-list" class="pending-list"></div>
            </div>
            <div class="footer">
                <button id="btn-complete-all" class="footer-btn primary">完成登记</button>
            </div>
        </div>

        <div id="legacy-screen" class="screen">
            <div class="header">
                <button id="btn-back-from-legacy" class="back-btn">← 返回</button>
                <h1>遗留资产区域</h1>
            </div>
            <div class="content">
                <div id="legacy-list" class="legacy-list"></div>
            </div>
            <div class="footer">
                <button id="btn-export-all" class="footer-btn primary">导出全部</button>
            </div>
        </div>

        <div id="modal" class="modal">
            <div class="modal-content">
                <div id="modal-body"></div>
                <div class="modal-actions" id="modal-actions"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
